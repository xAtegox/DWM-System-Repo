# Picom configuration for transparency management with DWM

# Backend - GLX is usually best for tiling WMs
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
glx-swap-method = 3;  # More stable with tiling WMs
xrender-sync-fence = true;

# VSync - Crucial for eliminating tearing
vsync = true;
present-method = "glx";  # Uses GLX present extension for smooth frame delivery
# present-method = "drm";  # Alternative: DRM page flipping (if available)

# Frame pacing
# Enable this for smoother repaints
use-damage = true;
damage-radius = 1;

# Shadows - minimal and subtle
shadow = true;
shadow-radius = 5;         # Soft shadow blur
shadow-opacity = 0.4;      # Subtle but slightly visible (40% opacity)
shadow-offset-x = 2;       # Slight right offset
shadow-offset-y = 2;       # Slight down offset
shadow-exclude = [
  "class_g = 'dwm'",       # No shadow on dwm bar
  "class_g = 'dmenu'",     # No shadow on dmenu
  "class_g = 'slock'",     # No shadow on lock screen
];

# Fading
fading = false;

# Opacity
inactive-opacity = 0.75;
active-opacity = 0.75;
frame-opacity = 0.75;

# Window-specific opacity rules
# Transparency controlled via toggle-transparency script (xprop)
# No static rules - dynamic control only
opacity-rule = [
  "100:class_g = 'discord'",
  "100:class_g = 'org.gnome.Nautilus'",
  "100:class_g ?= 'helium'",
  "100:class_g = 'feh'",
  "100:name *= '.mp4'",
  "100:name= 'WorldPainter*'",
  "100:class_g = 'mpv'",
  "100:class_g = 'CurseForge'",
  "100:class_g = 'Minecraft'",
  "100:class_g = 'minecraft'",
  "100:name *= 'Minecraft Forge'",
  "100:class_g = 'slop'",
  "100:class_g = 'steam'",
  "100:class_g *= 'steam_app_'",
  "100:class_g = 'Steam'",
  "100:fullscreen",
  "100:class_g = 'Snapchat'",
  "100:class_g = 'snapchat-nativefier'",
  "100:class_g *= 'snapchat-nativefier'",
  "100:class_i *= 'snapchat-nativefier'",
  "100:class_g = 'Audacious'",
  "100:class_g = 'PrismLauncher'",
  "100:class_g = 'Minecraft 1.7.10'"
];


# Blur
blur-background = true;
blur-method = "dual_kawase";  # Fast and effective
blur-strength = 2.5;  # Reduced from 3 for better performance

# Blur region rules (only blur specific areas)
# Exclude windows where we don't want blur
blur-background-exclude = [
  "class_g = 'dwm'",
  "class_g = 'dmenu'",
  "class_g = 'slop'", # To make screenshot work
 # "class_g = 'st-256color'",  # Exclude st for performance
 # "class_g = 'Alacritty'",  # Exclude alacritty if you use it
 # "class_g = 'kitty'",
];

# Window-specific blur for qutebrowser tab bar
# We'll use opacity rules to make tabs transparent + picom blur creates the effect
blur-background-fixed = false;

# Other
mark-wmwin-focused = true;
use-ewmh-active-window = true;
detect-rounded-corners = true;
detect-client-opacity = true;

# DWM-specific optimizations
# These help with window creation and positioning
detect-transient = true;
detect-client-leader = true;
