# Picom configuration for selective transparency and blur

# Backend - GLX is best for performance with blur
backend = "glx";
xrender-sync-fence = true;

# VSync
vsync = true;

# Shadows - subtle
shadow = true;
shadow-radius = 5;
shadow-opacity = 0.4;
shadow-offset-x = 2;
shadow-offset-y = 2;
shadow-exclude = [
  "class_g = 'dwm'",
  "class_g = 'dmenu'",
  "class_g = 'slock'",
  "class_g = 'slop'",
  "class_g = 'Minecraft* 1.20.1'"
];

# Fading
fading = false;

# Opacity Settings
# Global default is fully opaque
inactive-opacity = 1.0; active-opacity = 1.0; frame-opacity = 1.0;

# Window-specific opacity rules
opacity-rule = [
  # PRIORITY 1: Force CamPreview to be 100% opaque regardless of its class
  "100:name = 'CamPreview'",


  # PRIORITY 2: Targeted Apps at 75% transparency
  "75:class_g = 'st-256color'",
  "75:class_g = 'st'",
  "75:class_g = 'kitty'",
  "75:class_g = 'neovim'",
  "75:class_g = 'onlyoffice-desktopeditors'",
  "75:class_g = 'vlc'",
  "75:class_g = 'yazi'",
  "75:class_g = 'dwmblocks'",
  "75:class_g = 'dwm'",
  "75:name = 'ONLYOFFICE'",
];

# Blur Settings
blur-background = true;
blur-method = "dual_kawase";
blur-strength = 3;

# Blur Exclusion
# This ensures ONLY the transparent windows get blurred.
# Anything 100% opaque (including CamPreview) will not have blur processing behind it.
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "opacity >= 100",
  "name = 'CamPreview'",
  "class_g = 'slop'",
  "class_g = 'Minecraft* 1.20.1'"
];

# DWM-specific optimizations
mark-wmwin-focused = true;
use-ewmh-active-window = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;
