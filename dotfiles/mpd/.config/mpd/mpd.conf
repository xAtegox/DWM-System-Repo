# ---------------------------------------------------------
# MPD Configuration - Optimized for Arch + Pipewire + atego
# ---------------------------------------------------------

# Files and directories
#
music_directory "/home/atego/Music"
db_file "/home/atego/.local/share/mpd/database"
log_file "/home/atego/.local/share/mpd/log"
state_file "/home/atego/.local/share/mpd/state"
pid_file "/home/atego/.local/share/mpd/pid"
#
# Network
# Binding to 127.0.0.1 ensures it uses a network port that rmpc can find
bind_to_address     "127.0.0.1"
port                "6600"
restore_paused      "yes"
auto_update         "yes"

# Audio Output (Pipewire)
audio_output {
    type            "pipewire"
    name            "Pipewire Sound Server"
}

# This allows rmpc and mpc to control volume independently
mixer_type          "software"

# Permissions (Commented out because systemd --user handles this)
# user              "atego"
